apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-delivery
  template:
    metadata:
      labels:
        app: food-delivery
    spec:
      containers:
      - name: food-delivery-container
        image: python:3.10-slim  # In a real setup, replace with your Docker Hub image
        command: ["python", "delivery.py"]

---

apiVersion: v1
kind: Service
metadata:
  name: food-delivery-service
spec:
  selector:
    app: food-delivery
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
